<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Classical Chinese Poetry</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --aegean: #2B5F75;
      --wine-dark: #5C2E3E;
      --bronze-gold: #B8860B;
      --parchment: #F5F3ED;
      --ink: #2C2C2C;
      --border-light: #D4CEC1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--parchment) 0%, #EAE4D8 100%);
      min-height: 100vh;
      display: flex;
      color: var(--ink);
      overflow-x: hidden;
    }

    .sidebar {
      width: 320px;
      background: white;
      border-right: 2px solid var(--border-light);
      padding: 2rem 1.5rem;
      overflow-y: auto;
      flex-shrink: 0;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      z-index: 999;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      box-shadow: 2px 0 12px rgba(0, 0, 0, 0.1);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-light);
    }

    .sidebar .wen-mark {
      font-size: 2rem;
      color: var(--bronze-gold);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .sidebar h2 {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--aegean);
      margin-bottom: 0.25rem;
    }

    .sidebar-subtitle {
      font-size: 0.9rem;
      color: #666;
      font-style: italic;
    }

    .poem-list {
      list-style: none;
    }

    .poem-list-item {
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .poem-list-item:active {
      background: var(--parchment);
      border-color: var(--border-light);
    }

    .poem-list-item.active {
      background: var(--aegean);
      color: white;
      border-color: var(--aegean);
    }

    .poem-list-item.active .poem-item-meta,
    .poem-list-item.active .poem-item-english {
      color: rgba(255, 255, 255, 0.9);
    }

    .poem-item-title {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .poem-item-english {
      font-size: 0.95rem;
      font-style: italic;
      color: #555;
    }

    .poem-item-meta {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.25rem;
    }

    .check-icon {
      color: var(--bronze-gold);
      font-weight: bold;
      font-size: 1rem;
    }

    .poem-list-item.active .check-icon {
      color: #FFD700;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      padding-top: 5rem;
      overflow-y: auto;
      width: 100%;
    }

    .toggle-sidebar {
      position: fixed;
      top: 1rem;
      left: 1rem;
      background: white;
      border: 2px solid var(--aegean);
      border-radius: 6px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      z-index: 1000;
      font-size: 1rem;
      color: var(--aegean);
      font-weight: 500;
      -webkit-user-select: none;
      user-select: none;
    }

    .toggle-sidebar:active {
      background: var(--aegean);
      color: white;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      color: var(--aegean);
      letter-spacing: 0.02em;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--wine-dark);
      margin-top: 0.5rem;
      font-style: italic;
    }

    .card-container {
      perspective: 1000px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 2rem;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 450px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
      -webkit-user-select: none;
      user-select: none;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      min-height: 450px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: white;
      border: 2px solid var(--border-light);
      border-radius: 12px;
      padding: 2rem 1.5rem;
      box-shadow: 0 8px 24px rgba(43, 95, 117, 0.15);
    }

    .card-back {
      transform: rotateY(180deg);
    }

    .poem-header {
      text-align: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-light);
    }

    .poem-title {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--wine-dark);
      margin-bottom: 0.5rem;
    }

    .poem-title-english {
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--aegean);
      font-style: italic;
      margin-bottom: 0.75rem;
    }

    .poem-meta {
      font-size: 0.9rem;
      color: #666;
    }

    .poem-text {
      font-size: 1.5rem;
      line-height: 2;
      color: var(--ink);
      text-align: center;
      white-space: pre-line;
      margin-top: 1.5rem;
    }

    .poem-pinyin {
      font-size: 1rem;
      line-height: 1.6;
      color: #555;
      text-align: center;
      white-space: pre-line;
      margin: 1.5rem 0;
      font-style: italic;
    }

    .poem-translation {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--ink);
      white-space: pre-line;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-light);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    button {
      font-size: 1rem;
      padding: 0.75rem 2rem;
      border: 2px solid var(--aegean);
      background: white;
      color: var(--aegean);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
      -webkit-user-select: none;
      user-select: none;
    }

    button:active {
      background: var(--aegean);
      color: white;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button:disabled:active {
      background: white;
      color: var(--aegean);
    }

    .flip-hint {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      font-style: italic;
      margin-bottom: 1rem;
    }

    .progress {
      text-align: center;
      font-size: 1rem;
      color: var(--wine-dark);
      margin-bottom: 1rem;
    }

    .memorized-badge {
      display: inline-block;
      background: var(--bronze-gold);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 0.5rem;
    }

    @media (min-width: 769px) {
      .sidebar {
        transform: translateX(0);
        position: relative;
        width: 320px;
      }

      .toggle-sidebar {
        display: none;
      }

      .main-content {
        padding-top: 2rem;
      }

      .card-container {
        max-width: 800px;
      }

      .card-face {
        padding: 3rem;
        min-height: 500px;
      }

      .card {
        min-height: 500px;
      }

      .poem-title {
        font-size: 2rem;
      }

      .poem-title-english {
        font-size: 1.4rem;
      }

      .poem-text {
        font-size: 1.8rem;
        line-height: 2.2;
      }

      .poem-pinyin {
        font-size: 1.1rem;
        line-height: 1.8;
      }

      .poem-translation {
        font-size: 1.15rem;
        line-height: 1.8;
      }
    }
  </style>
</head>
<body>
  <button class="toggle-sidebar" onclick="toggleSidebar()">☰ Menu</button>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="wen-mark">文</div>
      <h2>Classical Chinese Poetry</h2>
      <div class="sidebar-subtitle">Twelve Poems</div>
    </div>
    <ul class="poem-list" id="poemList"></ul>
  </div>

  <div class="main-content">
    <div class="header">
      <h1>Classical Chinese Poetry</h1>
      <div class="subtitle">Twelve Poems for Memorization</div>
    </div>

    <div class="progress" id="progress"></div>

    <div class="card-container">
      <div class="card" id="card" onclick="flipCard()">
        <div class="card-face card-front" id="cardFront"></div>
        <div class="card-face card-back" id="cardBack"></div>
      </div>
    </div>

    <div class="flip-hint">Tap card to flip</div>

    <div class="controls">
      <button id="prevBtn" onclick="previousCard()">← Previous</button>
      <button id="nextBtn" onclick="nextCard()">Next →</button>
    </div>
  </div>

  <script>
    const poems = [
      {"id":1,"title":"鹿柴","titleEnglish":"Deer Enclosure","author":"王維","authorEnglish":"Wang Wei","date":"c. 750s–760s","chinese":"空山不見人\n但聞人語響\n返景入深林\n復照青苔上","pinyin":"kōng shān bù jiàn rén\ndàn wén rén yǔ xiǎng\nfǎn jǐng rù shēn lín\nfù zhào qīng tái shàng","translation":"Empty mountains — no one in sight\nOnly voices, echoes of speech\nReturning light enters the deep forest\nShines again on green moss","memorized":true},
      {"id":2,"title":"黃鶴樓送孟浩然之廣陵","titleEnglish":"Yellow Crane Tower: Farewell to Meng Haoran","author":"李白","authorEnglish":"Li Bai","date":"c. 730","chinese":"故人西辭黃鶴樓\n煙花三月下揚州\n孤帆遠影碧空盡\n唯見長江天際流","pinyin":"gù rén xī cí huáng hè lóu\nyān huā sān yuè xià yáng zhōu\ngū fān yuǎn yǐng bì kōng jìn\nwéi jiàn cháng jiāng tiān jì liú","translation":"My old friend takes leave at Yellow Crane Tower, westward bound\nIn the mist and flowers of third-month spring, descends toward Yangzhou\nA lone sail, distant shadow, fades into azure-green emptiness\nI see only the Yangzi, flowing on to the sky's edge","memorized":true},
      {"id":3,"title":"靜夜思","titleEnglish":"Quiet Night Thought","author":"李白","authorEnglish":"Li Bai","date":"c. 726","chinese":"床前明月光\n疑是地上霜\n舉頭望明月\n低頭思故鄉","pinyin":"chuáng qián míng yuè guāng\nyí shì dì shàng shuāng\njǔ tóu wàng míng yuè\ndī tóu sī gù xiāng","translation":"Bright moonlight before my bed\nI suspect it's frost on the ground\nLifting my head, I gaze at the bright moon\nLowering my head, I think of my old home","memorized":true},
      {"id":4,"title":"春曉","titleEnglish":"Spring Dawn","author":"孟浩然","authorEnglish":"Meng Haoran","date":"c. 715–720","chinese":"春眠不覺曉\n處處聞啼鳥\n夜來風雨聲\n花落知多少","pinyin":"chūn mián bù jué xiǎo\nchù chù wén tí niǎo\nyè lái fēng yǔ shēng\nhuā luò zhī duō shǎo","translation":"In spring sleep, I don't notice dawn\nEverywhere I hear birds crying\nLast night came sounds of wind and rain\nHow many fallen flowers, who can know?","memorized":true},
      {"id":5,"title":"春望","titleEnglish":"Spring View","author":"杜甫","authorEnglish":"Du Fu","date":"757","chinese":"國破山河在\n城春草木深\n感時花濺淚\n恨別鳥驚心\n烽火連三月\n家書抵萬金\n白頭搔更短\n渾欲不勝簪","pinyin":"guó pò shān hé zài\nchéng chūn cǎo mù shēn\ngǎn shí huā jiàn lèi\nhèn bié niǎo jīng xīn\nfēng huǒ lián sān yuè\njiā shū dǐ wàn jīn\nbái tóu sāo gèng duǎn\nhún yù bù shèng zān","translation":"The nation broken, mountains and rivers remain\nIn the ruined city, spring — grasses and trees grow deep\nMoved by the times, flowers splash tears\nResenting separation, birds startle the heart\nBeacon fires have lasted three months\nA letter from home worth ten thousand gold\nWhite-headed, I scratch — my hair grows even shorter\nSoon it will not hold a hairpin","memorized":false},
      {"id":6,"title":"玉華宮","titleEnglish":"Jade Flower Palace","author":"杜甫","authorEnglish":"Du Fu","date":"761","chinese":"谿回松風長\n蒼鼠奔古瓦\n不知何王殿\n遺構絕壁下\n陰房鬼火青\n壞道哀湍瀉\n萬籟真笙竽\n秋色正瀟灑","pinyin":"xī huí sōng fēng cháng\ncāng shǔ bēn gǔ wǎ\nbù zhī hé wáng diàn\nyí gòu jué bì xià\nyīn fáng guǐ huǒ qīng\nhuài dào āi tuān xiè\nwàn lài zhēn shēng yú\nqiū sè zhèng xiāo sǎ","translation":"The valley winds back, pine wind long and ceaseless\nGray rats scurry over ancient roof tiles\nI don't know which king's palace this was—\nAbandoned ruins beneath a sheer cliff\nIn dark chambers, ghost-fires flicker blue-green\nOn broken paths, mournful torrents pour\nTen thousand sounds become true reed organs\nAutumn's colors spread with desolate grace","memorized":false},
      {"id":7,"title":"關雎","titleEnglish":"Fishhawks","author":"詩經","authorEnglish":"Shijing (Book of Songs)","date":"c. 1000–600 BCE","chinese":"關關雎鳩\n在河之洲\n窈窕淑女\n君子好逑\n參差荇菜\n左右流之\n窈窕淑女\n寤寐求之\n求之不得\n寤寐思服\n悠哉悠哉\n輾轉反側\n參差荇菜\n左右采之\n窈窕淑女\n琴瑟友之\n參差荇菜\n左右芼之\n窈窕淑女\n鐘鼓樂之","pinyin":"guān guān jū jiū\nzài hé zhī zhōu\nyǎo tiǎo shū nǚ\njūn zǐ hǎo qiú\ncēn cī xìng cài\nzuǒ yòu liú zhī\nyǎo tiǎo shū nǚ\nwù mèi qiú zhī\nqiú zhī bù dé\nwù mèi sī fú\nyōu zāi yōu zāi\nniǎn zhuǎn fǎn cè\ncēn cī xìng cài\nzuǒ yòu cǎi zhī\nyǎo tiǎo shū nǚ\nqín sè yǒu zhī\ncēn cī xìng cài\nzuǒ yòu mào zhī\nyǎo tiǎo shū nǚ\nzhōng gǔ lè zhī","translation":"Guan-guan cry the fishhawks\nOn the river's islet\nA modest, virtuous maiden\nA fine match for the gentleman\nRagged, the water plants\nLeft and right we gather them\nA modest, virtuous maiden\nWaking and sleeping, he seeks her\nSeeking but not finding\nWaking and sleeping, he thinks of her\nEndless longing, endless longing\nTossing and turning on his bed\nRagged, the water plants\nLeft and right we pluck them\nA modest, virtuous maiden\nWith zither and lute, befriend her\nRagged, the water plants\nLeft and right we cull them\nA modest, virtuous maiden\nWith bells and drums, delight her","memorized":false},
      {"id":8,"title":"飲酒·其五","titleEnglish":"Drinking Wine, No. 5","author":"陶潛","authorEnglish":"Tao Qian","date":"c. 417","chinese":"結廬在人境\n而無車馬喧\n問君何能爾\n心遠地自偏\n採菊東籬下\n悠然見南山\n山氣日夕佳\n飛鳥相與還\n此中有真意\n欲辨已忘言","pinyin":"jié lú zài rén jìng\nér wú chē mǎ xuān\nwèn jūn hé néng ěr\nxīn yuǎn dì zì piān\ncǎi jú dōng lí xià\nyōu rán jiàn nán shān\nshān qì rì xī jiā\nfēi niǎo xiāng yǔ huán\ncǐ zhōng yǒu zhēn yì\nyù biàn yǐ wàng yán","translation":"I built my hut within the human realm\nYet hear no noise of horse and carriage\nYou ask: how can this be?\nWhen the heart is distant, the place becomes remote\nPicking chrysanthemums beneath the eastern hedge\nAt ease, I see the southern mountains\nThe mountain air is lovely at dusk\nFlying birds return together, in pairs\nIn this there is true meaning\nI want to explain, but have forgotten words","memorized":false},
      {"id":9,"title":"峨眉山月歌","titleEnglish":"Song of Mount Emei's Moon","author":"李白","authorEnglish":"Li Bai","date":"726","chinese":"峨眉山月半輪秋\n影入平羌江水流\n夜發清溪向三峽\n思君不見下渝州","pinyin":"é méi shān yuè bàn lún qiū\nyǐng rù píng qiāng jiāng shuǐ liú\nyè fā qīng xī xiàng sān xiá\nsī jūn bù jiàn xià yú zhōu","translation":"Mount Emei's moon, a half-wheel in autumn\nIts reflection enters the Pingqiang River, flowing\nBy night I set out from Qingxi toward the Three Gorges\nThinking of you but not seeing you, I descend toward Yuzhou","memorized":false},
      {"id":10,"title":"寒山詩之二十四","titleEnglish":"Cold Mountain Poem No. 24","author":"寒山","authorEnglish":"Hanshan","date":"c. 700–800","chinese":"欲得安身處\n寒山可長保\n微風吹幽松\n近聽聲愈好\n下有斑白人\n喃喃讀黃老\n十年歸不得\n忘卻來時道","pinyin":"yù dé ān shēn chù\nhán shān kě cháng bǎo\nwēi fēng chuī yōu sōng\njìn tīng shēng yù hǎo\nxià yǒu bān bái rén\nnán nán dú huáng lǎo\nshí nián guī bù dé\nwàng què lái shí dào","translation":"If you want a place to rest your body\nCold Mountain can be kept forever\nA light breeze blows through hidden pines\nDraw near to listen — the sound grows better\nBelow sits a grizzled man\nMurmuring, reading the Yellow Emperor and Laozi\nTen years and still unable to return\nHe's forgotten the path by which he came","memorized":false},
      {"id":11,"title":"問劉十九","titleEnglish":"Asking Liu the Nineteenth","author":"白居易","authorEnglish":"Bai Juyi","date":"c. 815–820","chinese":"綠蟻新醅酒\n紅泥小火爐\n晚來天欲雪\n能飲一杯無","pinyin":"lǜ yǐ xīn pēi jiǔ\nhóng ní xiǎo huǒ lú\nwǎn lái tiān yù xuě\nnéng yǐn yī bēi wú","translation":"Green-ant wine, freshly fermented\nA small red clay brazier\nToward evening, the sky threatens snow\nCan you drink a cup or not?","memorized":false},
      {"id":12,"title":"尋隱者不遇","titleEnglish":"Seeking a Recluse, Not Finding Him","author":"賈島","authorEnglish":"Jia Dao","date":"c. 800","chinese":"松下問童子\n言師採藥去\n只在此山中\n雲深不知處","pinyin":"sōng xià wèn tóng zǐ\nyán shī cǎi yào qù\nzhǐ zài cǐ shān zhōng\nyún shēn bù zhī chù","translation":"Under the pines I ask the boy\nHe says: my master has gone to gather herbs\nHe's somewhere in these mountains\nBut the clouds are deep — I don't know where","memorized":false}
    ];

    let currentIndex = 0;
    let isFlipped = false;

    function renderSidebar() {
      const list = document.getElementById('poemList');
      list.innerHTML = poems.map((poem, index) => `
        <li class="poem-list-item ${index === currentIndex ? 'active' : ''}" 
            onclick="jumpToPoem(${index})">
          <div class="poem-item-title">
            ${poem.memorized ? '<span class="check-icon">✓</span>' : ''}
            ${poem.title}
          </div>
          <div class="poem-item-english">${poem.titleEnglish}</div>
          <div class="poem-item-meta">${poem.author} — ${poem.date}</div>
        </li>
      `).join('');
    }

    function jumpToPoem(index) {
      currentIndex = index;
      resetCard();
      renderCard();
      renderSidebar();
      
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
      }
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function renderCard() {
      const poem = poems[currentIndex];
      const front = document.getElementById('cardFront');
      const back = document.getElementById('cardBack');

      const memorizedBadge = poem.memorized 
        ? '<span class="memorized-badge">✓ Memorized</span>' 
        : '';

      front.innerHTML = `
        <div class="poem-header">
          <div class="poem-title">${poem.title}</div>
          <div class="poem-title-english">${poem.titleEnglish}</div>
          <div class="poem-meta">
            <span>${poem.author}</span> (${poem.authorEnglish}) — ${poem.date}
            ${memorizedBadge}
          </div>
        </div>
        <div class="poem-text">${poem.chinese}</div>
      `;

      back.innerHTML = `
        <div class="poem-header">
          <div class="poem-title">${poem.title}</div>
          <div class="poem-title-english">${poem.titleEnglish}</div>
          <div class="poem-meta">
            <span>${poem.author}</span> (${poem.authorEnglish}) — ${poem.date}
            ${memorizedBadge}
          </div>
        </div>
        <div class="poem-text">${poem.chinese}</div>
        <div class="poem-pinyin">${poem.pinyin}</div>
        <div class="poem-translation">${poem.translation}</div>
      `;

      updateProgress();
      updateButtons();
      renderSidebar();
    }

    function updateProgress() {
      const progress = document.getElementById('progress');
      progress.textContent = `Poem ${currentIndex + 1} of ${poems.length}`;
    }

    function updateButtons() {
      document.getElementById('prevBtn').disabled = currentIndex === 0;
      document.getElementById('nextBtn').disabled = currentIndex === poems.length - 1;
    }

    function flipCard() {
      const card = document.getElementById('card');
      isFlipped = !isFlipped;
      card.classList.toggle('flipped');
    }

    function nextCard() {
      if (currentIndex < poems.length - 1) {
        currentIndex++;
        resetCard();
        renderCard();
      }
    }

    function previousCard() {
      if (currentIndex > 0) {
        currentIndex--;
        resetCard();
        renderCard();
      }
    }

    function resetCard() {
      const card = document.getElementById('card');
      if (isFlipped) {
        card.classList.remove('flipped');
        isFlipped = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') previousCard();
      if (e.key === 'ArrowRight') nextCard();
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        flipCard();
      }
    });

    renderCard();
    renderSidebar();
  </script>
</body>
</html>
